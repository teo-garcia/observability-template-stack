global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: observability-template-stack
    environment: local

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: tempo
    scrape_interval: 60s
    scrape_timeout: 2s
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]

  - job_name: alloy
    static_configs:
      - targets: ["alloy:12345"]

  - job_name: nest-template-monolith
    metrics_path: /metrics
    static_configs:
      - targets: ["nest-template-monolith:3000"]

  - job_name: fastapi-template-monolith
    metrics_path: /metrics
    static_configs:
      - targets: ["fastapi-template-monolith:8000"]

  - job_name: django-template-monolith
    metrics_path: /metrics
    static_configs:
      - targets: ["django-template-monolith:8000"]

  - job_name: adonis-template-monolith
    metrics_path: /metrics
    static_configs:
      - targets: ["adonis-template-monolith:3333"]
