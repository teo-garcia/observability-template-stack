server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

metrics_generator:
  storage:
    path: /var/tempo/generator/metrics
  ring:
    kvstore:
      store: inmemory
  traces_storage:
    path: /var/tempo/generator/wal
  processor:
    local_blocks:
      filter_server_spans: false

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces

compactor:
  compaction:
    block_retention: 24h

overrides:
  defaults:
    metrics_generator:
      processors: [local-blocks]
